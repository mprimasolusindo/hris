name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

env:
  SSH_HOST: 31.97.190.61
  SSH_PORT: "22"
  SSH_USER: hrismps
  DEPLOY_PATH: /var/www/vhosts/mitraprimasolusindo.com/hris
  # Override in GitHub repo Variables if Plesk uses non-default paths.
  # Composer runs THROUGH this PHP binary, so it uses 8.3 (not the server default).
  REMOTE_PHP: /opt/plesk/php/8.3/bin/php
  # Leave blank to auto-detect composer.phar, or set the full path to it.
  REMOTE_COMPOSER: ""
  REMOTE_NPM: npm

jobs:
  deploy:
    name: Deploy and build on server
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get update -qq && sudo apt-get install -y -qq sshpass

      - name: Sync application files
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          set -euo pipefail

          SSH_CMD=(sshpass -e ssh -p "${SSH_PORT}" -o StrictHostKeyChecking=accept-new)

          "${SSH_CMD[@]}" "${SSH_USER}@${SSH_HOST}" \
            "if [[ ! -d '${DEPLOY_PATH}' ]]; then echo \"ERROR: ${DEPLOY_PATH} does not exist. Create it in Plesk (or ask your host) before deploying.\"; exit 1; fi; if [[ ! -w '${DEPLOY_PATH}' ]]; then echo \"ERROR: ${DEPLOY_PATH} is not writable by ${USER}.\"; exit 1; fi"

          tar czf - \
            --exclude='./.git' \
            --exclude='./.github' \
            --exclude='./.specstory' \
            --exclude='./node_modules' \
            --exclude='./vendor' \
            --exclude='./.env' \
            --exclude='./storage' \
            --exclude='./bootstrap/cache' \
            --exclude='./public/build' \
            --exclude='./public/hot' \
            --exclude='./public/storage' \
            . | "${SSH_CMD[@]}" "${SSH_USER}@${SSH_HOST}" "cd '${DEPLOY_PATH}' && tar xzf -"

      - name: Install dependencies and optimize on server
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          set -euo pipefail

          sshpass -e ssh -p "${SSH_PORT}" -o StrictHostKeyChecking=accept-new \
            "${SSH_USER}@${SSH_HOST}" \
            "DEPLOY_PATH='${DEPLOY_PATH}' REMOTE_PHP='${REMOTE_PHP}' REMOTE_COMPOSER='${REMOTE_COMPOSER}' REMOTE_NPM='${REMOTE_NPM}' bash -s" <<'REMOTE_SCRIPT'
          set -euo pipefail

          if [[ ! -d "${DEPLOY_PATH}" ]]; then
            echo "ERROR: ${DEPLOY_PATH} does not exist."
            exit 1
          fi

          cd "${DEPLOY_PATH}"

          if [[ ! -f .env ]]; then
            echo "ERROR: ${DEPLOY_PATH}/.env is missing. Create it on the server before deploying."
            exit 1
          fi

          COMPOSER_BIN="${REMOTE_COMPOSER:-}"
          if [[ -z "${COMPOSER_BIN}" ]]; then
            for c in /usr/lib/plesk-9.0/composer.phar /usr/local/bin/composer.phar "${HOME}/composer.phar" /usr/local/bin/composer; do
              if [[ -f "$c" ]]; then COMPOSER_BIN="$c"; break; fi
            done
          fi
          if [[ -z "${COMPOSER_BIN}" ]]; then
            echo "ERROR: composer not found. Set REMOTE_COMPOSER to the composer.phar path on the server."
            exit 1
          fi

          "${REMOTE_PHP}" "${COMPOSER_BIN}" install --no-dev --optimize-autoloader --no-interaction
          "${REMOTE_NPM}" ci
          "${REMOTE_NPM}" run build

          mkdir -p storage/framework/{cache,sessions,views} storage/logs bootstrap/cache
          chmod -R ug+rwx storage bootstrap/cache

          "${REMOTE_PHP}" artisan storage:link --force
          "${REMOTE_PHP}" artisan config:cache
          "${REMOTE_PHP}" artisan route:cache
          "${REMOTE_PHP}" artisan view:cache

          echo "Deploy finished successfully."
          REMOTE_SCRIPT
